spring:
  application:
    name: topology-service

  jackson:
    serialization:
      write-dates-as-timestamps: false

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:UnaPasswordForte123!}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    it.yourcompany.topologyservice: DEBUG
    org.springframework.data.neo4j: INFO

